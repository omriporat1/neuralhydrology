# Minimal pytest configuration (Milestone 2K-G-I I-B).
# testpaths scopes collection to tests/ so that a bare `python -m pytest`
# does not (a) collect scripts/test_usgs_rbi_calculation.py — a standalone
# main()-style script that merely matches the test_*.py pattern — or
# (b) recursively scan the large gitignored tmp/ and reports/ trees.
[pytest]
testpaths = tests
